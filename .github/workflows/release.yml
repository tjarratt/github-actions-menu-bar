name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: |
          VERSION=$(xcodebuild -project GithubActionsMenuBar.xcodeproj \
            -scheme GithubActionsMenuBar \
            -showBuildSettings \
            -configuration Release 2>/dev/null \
            | grep '^\s*MARKETING_VERSION' | head -1 | awk '{print $3}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build app
        run: |
          xcodebuild build \
            -project GithubActionsMenuBar.xcodeproj \
            -scheme GithubActionsMenuBar \
            -configuration Release \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_STYLE=Manual

      - name: Create DMG
        run: |
          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release/GithubActionsMenuBar.app"
          DMG_PATH="$RUNNER_TEMP/GithubActionsMenuBar-${{ steps.version.outputs.version }}.dmg"

          mkdir -p $RUNNER_TEMP/dmg_staging
          cp -r "$APP_PATH" $RUNNER_TEMP/dmg_staging/
          ln -s /Applications $RUNNER_TEMP/dmg_staging/Applications

          hdiutil create \
            -volname "Github Actions Menu Bar" \
            -srcfolder $RUNNER_TEMP/dmg_staging \
            -ov \
            -format UDZO \
            "$DMG_PATH"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ runner.temp }}/GithubActionsMenuBar-${{ steps.version.outputs.version }}.dmg
